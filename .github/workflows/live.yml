name: Live devnet tests

on:
  # Manual only - run on demand; skips itself gracefully when secrets are absent
  # or the devnet wallet is dry.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live:
    name: Devnet conformance
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install

      - name: Run live devnet tests
        env:
          ELISYM_EVAL_DEVNET_PAYER: ${{ secrets.ELISYM_EVAL_DEVNET_PAYER }}
          ELISYM_EVAL_DEVNET_PAYEE: ${{ secrets.ELISYM_EVAL_DEVNET_PAYEE }}
          ELISYM_EVAL_RPC_URL: ${{ secrets.ELISYM_EVAL_RPC_URL }}
        run: bun run test:live
